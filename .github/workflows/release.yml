name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create GitHub Release
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - name: Ensure modern npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          # Not needed once OIDC trusted publishing is active; used only as a
          # fallback (e.g. the very first publish, which OIDC cannot perform).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
